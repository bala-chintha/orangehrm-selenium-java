# Application URL
base.url=https://opensource-demo.orangehrmlive.com
# Admin credentials
admin.username=Admin
admin.password=admin123
# Browser: chrome | firefox | edge
browser=chrome
# Run headless: true | false
headless=false
# Implicit wait (seconds); rely on explicit waits
implicit.wait=0
# Explicit wait timeout (seconds)
explicit.wait=35
# Page load timeout (seconds)
page.load.timeout=60
# Screenshot directory (relative to project root)
screenshot.dir=reports/screenshots
# Extent report output path
extent.report.path=reports/ExtentReport.html
